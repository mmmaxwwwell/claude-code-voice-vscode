name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ESLint + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Install dependencies
        run: |
          nix develop --command bash -c "npm install && uv sync --dev"
      - name: ESLint
        run: nix develop --command bash -c "npm run lint"
      - name: ruff check
        run: nix develop --command bash -c "uv run ruff check sidecar/ tests/unit/python/"
      - name: ruff format check
        run: nix develop --command bash -c "uv run ruff format --check sidecar/ tests/unit/python/"

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Install dependencies
        run: nix develop --command bash -c "npm install"
      - name: TypeScript typecheck
        run: nix develop --command bash -c "npm run typecheck"

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Install dependencies
        run: nix develop --command bash -c "npm install"
      - name: Build extension
        run: nix develop --command bash -c "npm run build"
      - name: Verify dist/extension.js exists
        run: test -f dist/extension.js

  unit-tests:
    name: Unit Tests (vitest + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Install dependencies
        run: |
          nix develop --command bash -c "npm install && uv sync --dev"
      - name: TypeScript unit tests
        run: nix develop --command bash -c "npm run test:unit"
      - name: Python unit tests
        run: nix develop --command bash -c "uv run pytest tests/unit/python/ -v"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Install dependencies
        run: |
          nix develop --command bash -c "npm install && uv sync --dev"
      - name: Integration tests
        run: nix develop --command bash -c "npm run test:integration"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy SCA scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Semgrep SAST scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/default
            p/security-audit
            p/secrets

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
